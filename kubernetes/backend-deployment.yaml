apiVersion: apps/v1
kind: Deployment
metadata:
  name: fontpicker-backend-deployment
  labels:
    app: fontpicker-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fontpicker-backend
  template:
    metadata:
      labels:
        app: fontpicker-backend
    spec:
      containers:
      - name: backend
        image: fontpicker-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql://postgres:postgres@postgres-service:5432/fontpicker"
        - name: REDIS_URL
          value: "redis://redis-service:6379/0"
        resources:
          limits:
            cpu: "2"
            memory: "4Gi"
            # Un-comment below in GPU-enabled clusters to map CUDA hardware
            # nvidia.com/gpu: "1"
          requests:
            cpu: "1"
            memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: fontpicker-backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
