version: '3.8'

services:
  # FastAPI Backend microservice
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:postgres@db:5417/fontpicker
    depends_on:
      - redis
      - db
    restart: always

  # Vite React Frontend client
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

  # Redis cache / broker
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always

  # PostgreSQL database
  db:
    image: postgres:alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=fontpicker
    ports:
      - "5417:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
